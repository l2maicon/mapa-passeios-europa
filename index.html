<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa de Passeios 🔴🟠🟡⚪ — POA→Europa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #map{position:absolute;top:96px;bottom:0;left:0;right:0}
  header{position:absolute;top:0;left:0;right:0;background:#1b1b2f;color:#fff;z-index:1000;
    padding:6px 12px;display:flex;flex-direction:column;gap:6px}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;overflow-x:auto}
  header b{font-size:14px;white-space:nowrap}
  .city{background:#2d2d44;color:#fff;border:0;border-radius:14px;padding:5px 10px;font-size:12.5px;
    cursor:pointer;white-space:nowrap}
  .city:hover{background:#3d3d5c}
  .filt{display:inline-flex;align-items:center;gap:4px;background:#2d2d44;border-radius:14px;
    padding:4px 10px;font-size:12.5px;cursor:pointer;white-space:nowrap;user-select:none}
  .filt input{cursor:pointer;margin:0}
  .sep{opacity:.4;padding:0 2px}
  .legend{background:#fff;padding:7px 9px;font-size:12px;line-height:1.6;border-radius:6px;
    box-shadow:0 1px 5px rgba(0,0,0,.3);color:#222}
  .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:middle;
    border:2px solid #fff;box-shadow:0 0 0 1px #999}
  .r{background:#e23b3b}.o{background:#f0932b}.y{background:#f4c20d}.w{background:#c9c9c9}
  .leaflet-popup-content{font-size:13px;line-height:1.45}
  .leaflet-popup-content a{color:#1560d4}
  .pri{font-weight:700}
  .note{color:#b8580a;font-size:12px;margin-top:3px}
  #count{font-size:12px;opacity:.85;white-space:nowrap}
</style>
</head>
<body>
<header>
  <div class="row">
    <b>🗺️ Passeios POA→Europa</b>
    <span class="filt"><input type="checkbox" id="f_r" checked> 🔴 obrigatório</span>
    <span class="filt"><input type="checkbox" id="f_o" checked> 🟠 quase certo</span>
    <span class="filt"><input type="checkbox" id="f_y"> 🟡 opcional</span>
    <span class="filt"><input type="checkbox" id="f_w"> ⚪ sem interesse</span>
    <span id="count"></span>
  </div>
  <div class="row">
    <b>Ir p/:</b>
    <button class="city" data-c="londres">🇬🇧 Londres</button>
    <button class="city" data-c="paris">🇫🇷 Paris</button>
    <button class="city" data-c="barcelona">🇪🇸 Barcelona</button>
    <button class="city" data-c="madri">🇪🇸 Madri</button>
    <button class="city" data-c="porto">🇵🇹 Porto+Douro</button>
    <button class="city" data-c="lisboa">🇵🇹 Lisboa+Sintra</button>
    <button class="city" data-c="all">🌍 Tudo</button>
  </div>
</header>
<div id="map"></div>

];
const PRI = {
  r:{label:'🔴 Obrigatório', color:'#e23b3b'},
  o:{label:'🟠 Quase certo', color:'#f0932b'},
  y:{label:'🟡 Opcional',    color:'#f4c20d'},
  w:{label:'⚪ Sem interesse',color:'#c9c9c9'},
};
const VIEWS = {
  londres:[51.509,-0.118,11], paris:[48.860,2.345,12], barcelona:[41.395,2.165,12.5],
  madri:[40.418,-3.703,13], porto:[41.145,-8.611,13], lisboa:[38.72,-9.16,11],
};
const map = L.map('map',{zoomControl:true}).setView([46,3],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);

function icon(color){
  return L.divIcon({className:'',iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-9],
    html:`<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 0 1.5px #666"></div>`});
}
const ICONS = Object.fromEntries(Object.entries(PRI).map(([k,v])=>[k, icon(v.color)]));

// cria todos os markers uma vez
const markers = P.map(([lat,lng,nome,pri,cid,nota])=>{
  const s = SRC[cid]||{};
  const gmaps = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
  let html = `<div class="pri">${PRI[pri].label}</div><b>${nome}</b><br>`
    + `<a href="${gmaps}" target="_blank">📍 Google Maps</a>`;
  if(s.blog) html += ` · <a href="${s.blog}" target="_blank">📝 Blog</a>`;
  if(s.vid)  html += ` · <a href="${s.vid}" target="_blank">🎥 Vídeo</a>`;
  if(nota)   html += `<div class="note">${nota}</div>`;
  const m = L.marker([lat,lng],{icon:ICONS[pri]}).bindPopup(html)
    .bindTooltip(nome,{direction:'top',offset:[0,-8]});
  return {m,pri};
});

function activePris(){
  return {r:f_r.checked, o:f_o.checked, y:f_y.checked, w:f_w.checked};
}
function applyFilter(){
  const on = activePris(); let n=0;
  markers.forEach(({m,pri})=>{
    if(on[pri]){ if(!map.hasLayer(m)) m.addTo(map); n++; }
    else if(map.hasLayer(m)) map.removeLayer(m);
  });
  document.getElementById('count').textContent = `${n} pontos no mapa`;
}
['f_r','f_o','f_y','f_w'].forEach(id=>document.getElementById(id).addEventListener('change',applyFilter));
document.querySelectorAll('.city').forEach(b=>b.onclick=()=>{
  const c=b.dataset.c;
  if(c==='all'){ map.setView([46,3],5); return; }
  const v=VIEWS[c]; map.flyTo([v[0],v[1]],v[2]);
});

// legenda
const lg=L.control({position:'bottomright'});
lg.onAdd=()=>{const d=L.DomUtil.create('div','legend');
  d.innerHTML='<span class="dot r"></span>🔴 obrigatório<br><span class="dot o"></span>🟠 quase certo<br>'
    +'<span class="dot y"></span>🟡 opcional<br><span class="dot w"></span>⚪ sem interesse<br>'
    +'<small>filtro no topo · popup: Maps · blog · vídeo</small>';return d;};
lg.addTo(map);

// estado inicial: só 🔴 + 🟠 marcados (como no HTML)
applyFilter();
</script>

</html>
