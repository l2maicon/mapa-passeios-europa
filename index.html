<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa de Passeios 🔴🟠🟡⚪ — POA→Europa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #map{position:absolute;top:0;bottom:0;left:232px;right:0}
  header{position:absolute;top:0;bottom:0;left:0;width:232px;box-sizing:border-box;overflow-y:auto;
    background:#1b1b2f;color:#fff;z-index:1000;padding:12px 10px;display:flex;flex-direction:column;gap:14px}
  .ttl{font-size:15px;font-weight:700;line-height:1.2}
  .grp{display:flex;flex-direction:column;gap:6px}
  .grp>b{font-size:11px;text-transform:uppercase;letter-spacing:.04em;opacity:.7}
  .cities{display:flex;flex-wrap:wrap;gap:6px}
  .hint{font-size:11px;opacity:.65;line-height:1.3}
  #count{font-size:12px;opacity:.9;margin-top:auto;padding-top:8px;border-top:1px solid #ffffff22}
  select{max-width:100%}
  @media(max-width:620px){
    header{position:absolute;bottom:auto;width:auto;right:0;flex-direction:row;flex-wrap:wrap;gap:8px 10px}
    #map{left:0;top:158px}
    .grp{flex-direction:row;align-items:center;flex-wrap:wrap}
    #count{margin-top:0;border-top:0;padding-top:0}
  }
  .city{background:#2d2d44;color:#fff;border:0;border-radius:14px;padding:5px 10px;font-size:12.5px;
    cursor:pointer;white-space:nowrap}
  .city:hover{background:#3d3d5c}
  .filt{display:inline-flex;align-items:center;gap:4px;background:#2d2d44;border-radius:14px;
    padding:4px 10px;font-size:12.5px;cursor:pointer;white-space:nowrap;user-select:none}
  .filt input{cursor:pointer;margin:0}
  .sep{opacity:.4;padding:0 2px}
  .legend{background:#fff;padding:7px 9px;font-size:12px;line-height:1.6;border-radius:6px;
    box-shadow:0 1px 5px rgba(0,0,0,.3);color:#222}
  .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:middle;
    border:2px solid #fff;box-shadow:0 0 0 1px #999}
  .r{background:#e23b3b}.o{background:#f0932b}.y{background:#f4c20d}.w{background:#c9c9c9}
  .leaflet-popup-content{font-size:13px;line-height:1.45}
  .leaflet-popup-content a{color:#1560d4}
  .pri{font-weight:700}
  .note{color:#b8580a;font-size:12px;margin-top:3px}
  #count{font-size:12px;opacity:.85;white-space:nowrap}
</style>
</head>
<body>
<header>
  <div class="ttl">🗺️ Passeios POA→Europa</div>
  <div class="grp">
    <b>🧭 Roteiro</b>
    <select id="f_rota" style="background:#2d2d44;color:#fff;border:0;border-radius:10px;padding:6px 9px;font-size:12.5px;cursor:pointer">
      <option value="marselha">Principal (Marselha)</option>
      <option value="folga">Alt.: sem Londres (bate-voltas)</option>
      <option value="londres">Em espera: com Londres</option>
    </select>
  </div>
  <div class="grp">
    <b>Prioridade</b>
    <label class="filt"><input type="checkbox" id="f_r" checked> 🔴 obrigatório</label>
    <label class="filt"><input type="checkbox" id="f_o" checked> 🟠 quase certo</label>
    <label class="filt"><input type="checkbox" id="f_y"> 🟡 opcional</label>
    <label class="filt"><input type="checkbox" id="f_w"> ⚪ sem interesse</label>
  </div>
  <div class="grp">
    <b>Ir para</b>
    <div class="cities">
      <button class="city" data-c="madri">🇪🇸 Madri</button>
      <button class="city" data-c="barcelona">🇪🇸 Barcelona</button>
      <button class="city" data-c="marselha">🇫🇷 Marselha</button>
      <button class="city" data-c="paris">🇫🇷 Paris</button>
      <button class="city" data-c="porto">🇵🇹 Porto+Douro</button>
      <button class="city" data-c="lisboa">🇵🇹 Lisboa+Sintra</button>
      <button class="city" data-c="londres">🇬🇧 Londres</button>
      <button class="city" data-c="all">🌍 Tudo</button>
    </div>
  </div>
  <div class="grp">
    <b>📅 Filtrar dia</b>
    <div style="display:flex;align-items:center;gap:6px">
      <button class="city" id="dia_prev" title="Dia anterior" style="padding:6px 11px">◀</button>
      <select id="f_dia" style="background:#2d2d44;color:#fff;border:0;border-radius:10px;padding:6px 9px;font-size:12.5px;cursor:pointer;flex:1;min-width:0"></select>
      <button class="city" id="dia_next" title="Próximo dia" style="padding:6px 11px">▶</button>
    </div>
    <button class="city" id="dia_clear">limpar dia</button>
    <span class="hint">mostra certos + talvez do dia</span>
  </div>
  <div class="grp">
    <b>⏰ Horário</b>
    <div style="display:flex;align-items:center;gap:6px">
      <button class="city" id="hora_prev" title="Horário anterior" style="padding:6px 11px">◀</button>
      <select id="f_hora" style="background:#2d2d44;color:#fff;border:0;border-radius:10px;padding:6px 9px;font-size:12.5px;cursor:pointer;flex:1;min-width:0"></select>
      <button class="city" id="hora_next" title="Próximo horário" style="padding:6px 11px">▶</button>
    </div>
    <span class="hint">só horários com item · abre o modal · setas viram o dia</span>
  </div>
  <div class="grp">
    <b>🏷️ Categoria</b>
    <select id="f_cat" style="background:#2d2d44;color:#fff;border:0;border-radius:10px;padding:6px 9px;font-size:12.5px;cursor:pointer"></select>
    <button class="city" id="cat_clear">limpar categoria</button>
    <span class="hint">combina com prioridade + dia</span>
  </div>
  <div id="count"></div>
</header>

function term(nome, cid){
  const n = nome.split(' (')[0].split(' — ')[0].split(' / ')[0].trim();

}

function curRota(){ const e=document.getElementById('f_rota'); return e?e.value:'marselha'; }
function effDia(cid,nome){ const k=cid+'|'+nome, o=ROTAS[curRota()].DIA; return (o&&o[k]!==undefined)?o[k]:DIA[k]; }
function effHora(cid,nome){ const k=cid+'|'+nome, o=ROTAS[curRota()].HORA; return (o&&o[k]!==undefined)?o[k]:HORA[k]; }
function parseHora(h){ if(!h) return null; const m=String(h).match(/(\d{1,2}):(\d{2})/); return m?(+m[1])*60+(+m[2]):null; }
function fmtHora(min){ return String(Math.floor(min/60)).padStart(2,'0')+'h'+String(min%60).padStart(2,'0'); }
function diaHtmlFor(cid,nome){ const dd=effDia(cid,nome), hh=effHora(cid,nome); let h='';
  if(dd&&dd.c&&dd.c.length) h+=`<div style="font-size:12.5px"><b>📅 Certo:</b> ${dd.c.join(' · ')}</div>`;
  const hasDay = !!(dd && ((dd.c&&dd.c.length)||(dd.m&&dd.m.length)));
  const min = parseHora(hh);
  if(hasDay && min===null) h+=`<div style="display:inline-block;background:#b8580a;color:#fff;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:700;margin:4px 0">⏰ SEM HORÁRIO${hh?' · '+hh:''}</div>`;
  else if(hh) h+=`<div style="font-size:12.5px"><b>⏰ Horário:</b> ${hh}</div>`;
  if(dd&&dd.m&&dd.m.length) h+=`<div style="font-size:12.5px;color:#b8580a"><b>📅 Talvez:</b> ${dd.m.join(' · ')}</div>`;
  return h; }
const FOLGA_ONLY=new Set(['Chartres (catedral)','Reims (Champagne)','Guimarães (Castelo)','Braga (Bom Jesus)']);
function inRota(cid,nome){ const r=curRota();
  if(cid==='londres') return r==='londres';
  if(cid==='marselha') return r==='marselha';
  if(FOLGA_ONLY.has(nome)) return r==='folga';
  return true; }
const markers = P.map(([lat,lng,nome,pri,cid,nota])=>{
  const s = SRC[cid]||{};
  const q = term(nome, cid);
  const gmaps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
  const cat = CAT[cid+'|'+nome]; const cm = CATMETA[cat];
  const staticHtml = (PHOTO[nome] ? `<a href="${gmaps}" target="_blank"><img src="${PHOTO[nome]}" alt="" loading="lazy" style="width:100%;max-width:595px;height:357px;object-fit:cover;border-radius:7px;margin:7px 0;background:#eee;display:block"/></a>` : '')
    + `<a href="${gmaps}" target="_blank">📍 Google Maps</a>`
    + (s.blog?` · <a href="${s.blog}" target="_blank">📝 Blog</a>`:'')
    + (s.vid?` · <a href="${s.vid}" target="_blank">🎥 Vídeo</a>`:'')
    + (nota?`<div class="note">${nota}</div>`:'');
  function mkPopup(){ return `<div class="pri">${PRI[pri].label}${cm?' \u00b7 '+cm.ic+' '+cm.nome:''}</div><b>${nome}</b><br>`+diaHtmlFor(cid,nome)+staticHtml; }
  const m = L.marker([lat,lng],{icon:ICONS[pri]}).bindPopup(mkPopup(),{maxWidth:756,minWidth:420})
    .bindTooltip(nome,{direction:'top',offset:[0,-8]});
  m._q = q;
  return {m,pri,cat,cid,nome,mkPopup};
});
// ao abrir o popup, busca a foto do local (Wikipedia) e mostra se achar
function activePris(){
  return {r:f_r.checked, o:f_o.checked, y:f_y.checked, w:f_w.checked};
}
function applyFilter(){
  const on = activePris(); const day=document.getElementById('f_dia').value; const catSel=document.getElementById('f_cat').value; let n=0; const vis=[];
  markers.forEach(({m,pri,cat,cid,nome})=>{
    const dias = effDia(cid,nome);
    const inDay = day==='all' || (!!dias && ((dias.c||[]).includes(day)||(dias.m||[]).includes(day)));
    const show = inRota(cid,nome) && on[pri] && inDay && (catSel==='all'||cat===catSel);
    if(show){ if(!map.hasLayer(m)) m.addTo(map); n++; vis.push(m); }
    else if(map.hasLayer(m)) map.removeLayer(m);
  });
  document.getElementById('count').textContent = day==='all' ? `${n} pontos no mapa` : `${n} ponto(s) no dia ${day}`;
}
function cityBounds(cid){
  const ll=markers.filter(e=>e.cid===cid && map.hasLayer(e.m)).map(e=>e.m.getLatLng());
  return ll.length ? L.latLngBounds(ll) : null;
}
function focusDayCity(){
  const day=document.getElementById('f_dia').value;
  if(day==='all') return;
  const cnt={};
  markers.forEach(({m,cid})=>{ if(map.hasLayer(m)) cnt[cid]=(cnt[cid]||0)+1; });
  const top=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a])[0];
  const bb=top?cityBounds(top):null;
  if(bb) map.flyToBounds(bb,{padding:[55,55],maxZoom:13});
  else map.setView([46,3],5);
}

const DAYS=['24/10','25/10','26/10','27/10','28/10','29/10','30/10','31/10','01/11','02/11','03/11','04/11','05/11','06/11','07/11','08/11','09/11','10/11','11/11','12/11','13/11','14/11'];

document.getElementById('dia_clear').onclick=()=>{_sel.value='all';applyFilter();rebuildHoras();};
function stepDay(delta){
  const cur=_sel.value;
  let i = cur==='all' ? (delta>0?-1:DAYS.length) : DAYS.indexOf(cur);
  i=Math.max(0,Math.min(DAYS.length-1,i+delta));
  _sel.value=DAYS[i]; applyFilter(); focusDayCity(); rebuildHoras();
}
document.getElementById('dia_prev').onclick=()=>stepDay(-1);
document.getElementById('dia_next').onclick=()=>stepDay(1);
// ===== filtro de HORÁRIO =====
let SLOTS=[];
function slotsForDay(day){
  if(day==='all') return [];
  const on=activePris(); const catSel=document.getElementById('f_cat').value;
  const arr=[];
  markers.forEach(e=>{
    const dias=effDia(e.cid,e.nome);
    const inDay = !!dias && ((dias.c||[]).includes(day)||(dias.m||[]).includes(day));
    if(!inRota(e.cid,e.nome) || !on[e.pri] || !inDay || !(catSel==='all'||e.cat===catSel)) return;
    const min=parseHora(effHora(e.cid,e.nome));
    arr.push({e,min,label: min===null?'Sem Horário':fmtHora(min)});
  });
  arr.sort((a,b)=>{
    if(a.min===null&&b.min===null) return a.e.nome.localeCompare(b.e.nome);
    if(a.min===null) return -1; if(b.min===null) return 1;
    return a.min-b.min || a.e.nome.localeCompare(b.e.nome);
  });
  arr.forEach(x=> x.opt = x.label+' - '+x.e.nome);
  return arr;
}
function rebuildHoras(){
  const day=document.getElementById('f_dia').value, sel=document.getElementById('f_hora');
  SLOTS=slotsForDay(day);
  if(day==='all'||!SLOTS.length){
    sel.innerHTML='<option value="">'+(day==='all'?'(escolha um dia)':'(nenhum item)')+'</option>';
    sel.disabled=true; return;
  }
  sel.disabled=false;
  sel.innerHTML='<option value="">— horários do dia —</option>'+SLOTS.map((x,i)=>`<option value="${i}">${x.opt}</option>`).join('');
}
function openSlot(i){
  const x=SLOTS[i]; if(!x) return;
  const mk=x.e.m; if(!map.hasLayer(mk)) return;
  map.setView(mk.getLatLng(), Math.max(map.getZoom(),13), {animate:true});
  mk.openPopup();
}
function stepHora(delta){
  const selH=document.getElementById('f_hora'), selD=document.getElementById('f_dia');
  if(selD.value==='all'){ stepDay(delta>0?1:-1); rebuildHoras(); if(SLOTS.length){ const ni=delta>0?0:SLOTS.length-1; selH.value=String(ni); openSlot(ni);} return; }
  let i = selH.value===''? (delta>0?-1:SLOTS.length) : +selH.value;
  i += delta;
  if(i>=0 && i<SLOTS.length){ selH.value=String(i); openSlot(i); return; }
  // virou o dia
  let di=DAYS.indexOf(selD.value), guard=0;
  while(guard++<DAYS.length){
    di += (delta>0?1:-1);
    if(di<0||di>=DAYS.length) return;
    selD.value=DAYS[di]; applyFilter(); focusDayCity(); rebuildHoras();
    if(SLOTS.length){ const ni=delta>0?0:SLOTS.length-1; selH.value=String(ni); openSlot(ni); return; }
  }
}
document.getElementById('f_hora').addEventListener('change',e=>{ if(e.target.value!=='') openSlot(+e.target.value); });
document.getElementById('hora_prev').onclick=()=>stepHora(-1);
document.getElementById('hora_next').onclick=()=>stepHora(1);
const _cat=document.getElementById('f_cat');
_cat.innerHTML='<option value="all">Todas as categorias</option>'+Object.entries(CATMETA).map(([k,v])=>`<option value="${k}">${v.ic} ${v.nome}</option>`).join('');
_cat.addEventListener('change',()=>{applyFilter();rebuildHoras();});
document.getElementById('cat_clear').onclick=()=>{_cat.value='all';applyFilter();rebuildHoras();};
document.querySelectorAll('.city[data-c]').forEach(b=>b.onclick=()=>{
  const c=b.dataset.c;
  if(c==='all'){ map.setView([46,3],5); return; }

  else { const v=VIEWS[c]; map.flyTo([v[0],v[1]],v[2]); }
});
function showCityBtn(c,r){ return (c!=='marselha'||r==='marselha') && (c!=='londres'||r==='londres'); }
function onRotaChange(){ const r=curRota();
  markers.forEach(e=> e.m.setPopupContent(e.mkPopup()));
